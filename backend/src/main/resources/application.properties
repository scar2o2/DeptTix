server.port=${PORT:8081}
spring.config.import=optional:file:.env.properties,optional:file:backend/.env.properties
spring.datasource.url=${DATABASE_URL:${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}}
spring.datasource.username=${DATABASE_USERNAME:${SUPABASE_DB_USERNAME:postgres}}
spring.datasource.password=${DATABASE_PASSWORD:${SUPABASE_DB_PASSWORD:postgres}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:20000}
logging.level.org.hibernate.SQL=off
logging.level.org.hibernate.orm.jdbc.bind=off

app.auth.admin-emails=${APP_ADMIN_EMAILS:admin@department.edu}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://depttix.onrender.com}
firebase.service-account.type=${FIREBASE_TYPE:}
firebase.service-account.project-id=${FIREBASE_PROJECT_ID:}
firebase.service-account.private-key-id=${FIREBASE_PRIVATE_KEY_ID:}
firebase.service-account.private-key=${FIREBASE_PRIVATE_KEY:}
firebase.service-account.client-email=${FIREBASE_CLIENT_EMAIL:}
firebase.service-account.client-id=${FIREBASE_CLIENT_ID:}
firebase.service-account.auth-uri=${FIREBASE_AUTH_URI:https://accounts.google.com/o/oauth2/auth}
firebase.service-account.token-uri=${FIREBASE_TOKEN_URI:https://oauth2.googleapis.com/token}
firebase.service-account.auth-provider-x509-cert-url=${FIREBASE_AUTH_PROVIDER_X509_CERT_URL:https://www.googleapis.com/oauth2/v1/certs}
firebase.service-account.client-x509-cert-url=${FIREBASE_CLIENT_X509_CERT_URL:}
firebase.service-account.universe-domain=${FIREBASE_UNIVERSE_DOMAIN:googleapis.com}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
